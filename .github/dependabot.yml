version: 2

updates:
    - package-ecosystem: cargo
      directory: /
      schedule:
          interval: weekly
          day: tuesday
          time: "04:00"
          timezone: Asia/Shanghai
      open-pull-requests-limit: 3
      cooldown:
          default-days: 7
          semver-major-days: 21
      groups:
          cargo-minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - minor
                  - patch

    - package-ecosystem: npm
      directories:
          - /vrc-get-gui
          - /website
      schedule:
          interval: weekly
          day: tuesday
          time: "04:30"
          timezone: Asia/Shanghai
      open-pull-requests-limit: 3
      cooldown:
          default-days: 7
          semver-major-days: 21
      groups:
          npm-minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: tuesday
          time: "05:00"
          timezone: Asia/Shanghai
      open-pull-requests-limit: 2
      cooldown:
          default-days: 7
          semver-major-days: 21
      groups:
          actions-minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - minor
                  - patch
