name: Publish updater metadata

on:
    release:
        types:
            - published

permissions:
    contents: write

concurrency:
    group: release-updater-main
    cancel-in-progress: false
    queue: max

jobs:
    publish-updater:
        name: Publish updater metadata
        runs-on: windows-2025
        timeout-minutes: 30
        env:
            RELEASE_TAG: ${{ github.event.release.tag_name }}
            RELEASE_NAME: ${{ github.event.release.name }}
            RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
            RELEASE_SOURCE_SHA: ${{ github.event.release.target_commitish }}
            XTASK_PATH: target\x86_64-pc-windows-msvc\xtask\xtask.exe

        steps:
            - name: Checkout main
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: main
                  fetch-depth: 0
                  persist-credentials: false

            - name: Set up Node.js 24
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: website/package-lock.json

            - name: Set up pinned Rust toolchain
              shell: pwsh
              run: |
                  $config = Get-Content alcomd3.config.json -Raw | ConvertFrom-Json
                  $toolchain = $config.releaseAutomation.rustToolchain
                  if ([string]::IsNullOrWhiteSpace($toolchain)) {
                      throw "releaseAutomation.rustToolchain is not configured"
                  }
                  rustup toolchain install $toolchain --profile minimal --no-self-update
                  rustup default $toolchain

            - name: Derive release inputs
              shell: pwsh
              run: |
                  if ($env:RELEASE_TAG -notmatch '^v[0-9A-Za-z.+-]+$') {
                      throw "Unsupported release tag: $env:RELEASE_TAG"
                  }
                  $version = $env:RELEASE_TAG.Substring(1)
                  $expectedName = "Version $version"
                  if ($env:RELEASE_NAME -ne $expectedName) {
                      throw "Release title mismatch: expected $expectedName, got $env:RELEASE_NAME"
                  }
                  if ($env:RELEASE_SOURCE_SHA -notmatch '^[0-9a-fA-F]{40}$') {
                      throw "Release target_commitish must be a full commit SHA: $env:RELEASE_SOURCE_SHA"
                  }
                  $channel = if ($env:RELEASE_PRERELEASE -eq "true") { "beta" } else { "stable" }
                  "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            - name: Install Website dependencies
              working-directory: website
              shell: pwsh
              run: npm.cmd ci

            - name: Build release tooling without GitHub token
              shell: pwsh
              run: cargo build --profile xtask --target x86_64-pc-windows-msvc --package xtask

            - name: Configure updater commit author
              shell: pwsh
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Configure GitHub authentication
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: pwsh
              run: gh auth setup-git --hostname github.com

            - name: Generate, verify, test, and publish updater metadata
              id: publish_updater
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: pwsh
              run: |
                  $before = (git rev-parse --verify HEAD).Trim()
                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
                  & $env:XTASK_PATH release-updater `
                      --version $env:VERSION `
                      --channel $env:CHANNEL `
                      --source-sha $env:RELEASE_SOURCE_SHA `
                      --commit `
                      --push `
                      --check-public `
                      --public-check-attempts 30 `
                      --public-check-delay-seconds 20
                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
                  $after = (git rev-parse --verify HEAD).Trim()
                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
                  $changed = ($before -ne $after).ToString().ToLowerInvariant()
                  "metadata_changed=$changed" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "main_sha=$after" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

            - name: Record updater publication summary
              continue-on-error: true
              env:
                  GH_TOKEN: ${{ github.token }}
                  METADATA_CHANGED: ${{ steps.publish_updater.outputs.metadata_changed }}
                  MAIN_SHA: ${{ steps.publish_updater.outputs.main_sha }}
              shell: pwsh
              run: |
                  $releaseJson = gh release view $env:RELEASE_TAG `
                      --repo $env:GITHUB_REPOSITORY `
                      --json url
                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
                  $release = $releaseJson | ConvertFrom-Json
                  $config = Get-Content alcomd3.config.json -Raw | ConvertFrom-Json
                  $manifest = $config.updaterManifests.PSObject.Properties[$env:CHANNEL].Value
                  if ($null -eq $manifest) {
                      throw "Updater manifest is not configured for channel $env:CHANNEL"
                  }
                  $endpoint = "{0}/{1}" -f `
                      $config.homepageUrl.TrimEnd('/'), `
                      $manifest.publicPath.TrimStart('/')
                  $metadataStatus = if ($env:METADATA_CHANGED -eq "true") {
                      "Created and pushed"
                  } else {
                      "Already current; no commit created"
                  }
                  @(
                      "## Updater Publication",
                      "",
                      "| Field | Value |",
                      "| --- | --- |",
                      "| Release | [$env:RELEASE_TAG]($($release.url)) |",
                      "| Version | $env:VERSION |",
                      "| Channel | $env:CHANNEL |",
                      "| Release source SHA | $env:RELEASE_SOURCE_SHA |",
                      "| Metadata update | $metadataStatus |",
                      "| Final main SHA | $env:MAIN_SHA |",
                      "| Public endpoint | Passed: [$endpoint]($endpoint) |"
                  ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
