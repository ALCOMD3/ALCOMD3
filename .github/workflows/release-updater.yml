name: Publish updater metadata

on:
    release:
        types:
            - published
    workflow_dispatch:
        inputs:
            tag:
                description: Published ALCOMD3 release tag
                required: true
                type: string

permissions:
    contents: read

concurrency:
    group: release-updater-main
    cancel-in-progress: false
    queue: max

jobs:
    publish-updater:
        name: Publish updater metadata
        runs-on: windows-2025
        timeout-minutes: 30
        env:
            RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
            XTASK_PATH: target\x86_64-pc-windows-msvc\xtask\xtask.exe

        steps:
            - name: Resolve published release
              id: release
              shell: pwsh
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  $ErrorActionPreference = "Stop"
                  $release = gh release view $env:RELEASE_TAG `
                      --repo $env:GITHUB_REPOSITORY `
                      --json name,isDraft,isPrerelease,targetCommitish |
                      ConvertFrom-Json

                  if ($release.isDraft) {
                      throw "Release $env:RELEASE_TAG is still a draft."
                  }
                  if ($release.targetCommitish -notmatch '^[0-9a-fA-F]{40}$') {
                      throw "Release targetCommitish must be a full commit SHA."
                  }
                  if ($env:RELEASE_TAG -notmatch '^v[0-9A-Za-z.+-]+$') {
                      throw "Unsupported release tag: $env:RELEASE_TAG"
                  }
                  $version = $env:RELEASE_TAG.Substring(1)
                  $expectedName = "Version $version"
                  if ($release.name -ne $expectedName) {
                      throw "Release title mismatch: expected $expectedName, got $($release.name)"
                  }
                  $channel = if ($release.isPrerelease) { "beta" } else { "stable" }
                  "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "RELEASE_SOURCE_SHA=$($release.targetCommitish)" |
                      Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "source_sha=$($release.targetCommitish)" |
                      Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

            - name: Checkout pinned release source
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ steps.release.outputs.source_sha }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Set up pinned Rust toolchain
              shell: pwsh
              run: |
                  $config = Get-Content alcomd3.config.json -Raw | ConvertFrom-Json
                  $toolchain = $config.releaseAutomation.rustToolchain
                  if ([string]::IsNullOrWhiteSpace($toolchain)) {
                      throw "releaseAutomation.rustToolchain is not configured"
                  }
                  rustup toolchain install $toolchain --profile minimal --no-self-update
                  rustup default $toolchain

            - name: Build release tooling without GitHub token
              shell: pwsh
              run: cargo build --profile xtask --target x86_64-pc-windows-msvc --package xtask

            - name: Configure GitHub authentication
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: pwsh
              run: gh auth setup-git --hostname github.com

            - name: Generate and publish updater metadata
              id: publish_updater
              env:
                  GH_TOKEN: ${{ github.token }}
                  WEBSITE_DEPLOY_KEY: ${{ secrets.ALCOMD3_WEBSITE_DEPLOY_KEY }}
              shell: pwsh
              run: |
                  if ([string]::IsNullOrWhiteSpace($env:WEBSITE_DEPLOY_KEY)) {
                      throw "ALCOMD3_WEBSITE_DEPLOY_KEY is not configured"
                  }
                  $config = Get-Content alcomd3.config.json -Raw | ConvertFrom-Json
                  $websiteRepository = [string] $config.websiteRepository
                  if ($websiteRepository -notmatch '^[0-9A-Za-z_.-]+/[0-9A-Za-z_.-]+$') {
                      throw "websiteRepository must use OWNER/REPOSITORY format"
                  }
                  $manifest = $config.updaterManifests.PSObject.Properties[$env:CHANNEL].Value
                  if ($null -eq $manifest) {
                      throw "Updater manifest is not configured for channel $env:CHANNEL"
                  }
                  $relativeTarget = [string] $manifest.repositoryPath
                  if (
                      [string]::IsNullOrWhiteSpace($relativeTarget) -or
                      [IO.Path]::IsPathRooted($relativeTarget) -or
                      $relativeTarget.Replace('\', '/').Split('/') -contains '..'
                  ) {
                      throw "Updater repositoryPath must be a safe relative path"
                  }

                  $sshDirectory = Join-Path $env:RUNNER_TEMP 'alcomd3-website-ssh'
                  $websiteDirectory = Join-Path $env:RUNNER_TEMP 'alcomd3-website'
                  if ((Test-Path -LiteralPath $sshDirectory) -or (Test-Path -LiteralPath $websiteDirectory)) {
                      throw "Updater metadata synchronization temporary path already exists"
                  }
                  New-Item -ItemType Directory -Path $sshDirectory | Out-Null
                  $keyPath = Join-Path $sshDirectory 'deploy-key'
                  $privateKey = $env:WEBSITE_DEPLOY_KEY.Replace("`r`n", "`n").TrimEnd() + "`n"
                  [IO.File]::WriteAllText($keyPath, $privateKey, [Text.UTF8Encoding]::new($false))
                  icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)" | Out-Null

                  try {
                      $env:GIT_SSH_COMMAND = "ssh -i `"$keyPath`" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
                      $remote = "ssh://git@ssh.github.com:443/$websiteRepository.git"
                      git clone --depth 1 $remote $websiteDirectory
                      if ($LASTEXITCODE -ne 0) {
                          exit $LASTEXITCODE
                      }

                      $targetManifest = Join-Path $websiteDirectory $relativeTarget.Replace('/', [IO.Path]::DirectorySeparatorChar)
                      New-Item -ItemType Directory -Path (Split-Path -Parent $targetManifest) -Force | Out-Null

                      & $env:XTASK_PATH release-updater `
                          --version $env:VERSION `
                          --channel $env:CHANNEL `
                          --source-sha $env:RELEASE_SOURCE_SHA `
                          --output $targetManifest
                      if ($LASTEXITCODE -ne 0) {
                          exit $LASTEXITCODE
                      }

                      git -C $websiteDirectory config user.name "github-actions[bot]"
                      git -C $websiteDirectory config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                      git -C $websiteDirectory add -- $relativeTarget
                      git -C $websiteDirectory diff --cached --quiet
                      $diffExit = $LASTEXITCODE
                      if ($diffExit -eq 1) {
                          git -C $websiteDirectory commit -m "release: publish ALCOMD3 $env:VERSION updater metadata"
                          if ($LASTEXITCODE -ne 0) {
                              exit $LASTEXITCODE
                          }
                          git -C $websiteDirectory push origin main
                          if ($LASTEXITCODE -ne 0) {
                              exit $LASTEXITCODE
                          }
                          $changed = "true"
                      } elseif ($diffExit -ne 0) {
                          exit $diffExit
                      } else {
                          $changed = "false"
                      }
                      $websiteSha = (git -C $websiteDirectory rev-parse --verify HEAD).Trim()
                      if ($LASTEXITCODE -ne 0) {
                          exit $LASTEXITCODE
                      }
                      "manifest_path=$targetManifest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                      "metadata_changed=$changed" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                      "repository_sha=$websiteSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  } finally {
                      Remove-Item -LiteralPath $keyPath -Force -ErrorAction SilentlyContinue
                  }

            - name: Verify public updater endpoint
              env:
                  GH_TOKEN: ${{ github.token }}
                  UPDATER_MANIFEST_PATH: ${{ steps.publish_updater.outputs.manifest_path }}
              shell: pwsh
              run: |
                  & $env:XTASK_PATH release-updater `
                      --version $env:VERSION `
                      --channel $env:CHANNEL `
                      --source-sha $env:RELEASE_SOURCE_SHA `
                      --output $env:UPDATER_MANIFEST_PATH `
                      --check-public `
                      --public-check-attempts 30 `
                      --public-check-delay-seconds 20
                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }

            - name: Record updater publication summary
              continue-on-error: true
              env:
                  GH_TOKEN: ${{ github.token }}
                  METADATA_CHANGED: ${{ steps.publish_updater.outputs.metadata_changed }}
                  METADATA_REPOSITORY_SHA: ${{ steps.publish_updater.outputs.repository_sha }}
              shell: pwsh
              run: |
                  $releaseJson = gh release view $env:RELEASE_TAG `
                      --repo $env:GITHUB_REPOSITORY `
                      --json url
                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
                  $release = $releaseJson | ConvertFrom-Json
                  $config = Get-Content alcomd3.config.json -Raw | ConvertFrom-Json
                  $manifest = $config.updaterManifests.PSObject.Properties[$env:CHANNEL].Value
                  if ($null -eq $manifest) {
                      throw "Updater manifest is not configured for channel $env:CHANNEL"
                  }
                  $endpoint = "{0}/{1}" -f `
                      $config.homepageUrl.TrimEnd('/'), `
                      $manifest.publicPath.TrimStart('/')
                  $metadataStatus = if ($env:METADATA_CHANGED -eq "true") {
                      "Created and pushed"
                  } else {
                      "Already current; no commit created"
                  }
                  @(
                      "## Updater Publication",
                      "",
                      "| Field | Value |",
                      "| --- | --- |",
                      "| Release | [$env:RELEASE_TAG]($($release.url)) |",
                      "| Version | $env:VERSION |",
                      "| Channel | $env:CHANNEL |",
                      "| Release source SHA | $env:RELEASE_SOURCE_SHA |",
                      "| Metadata update | $metadataStatus |",
                      "| Metadata repository SHA | $env:METADATA_REPOSITORY_SHA |",
                      "| Public endpoint | Passed: [$endpoint]($endpoint) |"
                  ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
